name: Build desktop installers

# Produces the downloadable Mac (.dmg) and Windows (.exe) installers.
# Trigger by pushing a version tag (e.g. `git tag v0.1.0 && git push --tags`),
# or run manually from the Actions tab. Artifacts are attached to a GitHub
# Release so the README's download links resolve to real files.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            script: dist:mac
          - os: windows-latest
            script: dist:win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build installer
        run: npm run ${{ matrix.script }}
        env:
          # No paid Developer ID cert (this is a starting point — see README).
          # `mac.identity: null` still ad-hoc signs the arm64 app, which is
          # required for it to run at all on Apple Silicon and downgrades
          # Gatekeeper from "damaged" to the milder right-click-to-open dialog.
          # Do NOT set CSC_IDENTITY_AUTO_DISCOVERY=false — that would suppress
          # even the ad-hoc signature and reintroduce the "damaged" error.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installers as workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nitroai-${{ matrix.os }}
          path: |
            release/*.dmg
            release/*.exe
          if-no-files-found: warn

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
